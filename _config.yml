title: 삼성전자판매 AX 리더 실전 프로그램
description: 5/20 Day 1을 마친 AX 리더가 5/27까지 본인 업무로 가져갈 하네스를 만드는 작업실
remote_theme: just-the-docs/just-the-docs

# 사이트 URL (배포 후 갱신)
url: "https://edumagiceco.github.io"
baseurl: "/samsung-ax-leader-program"

# 검색
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

# 색상 — 삼성전자판매 브랜드 컬러 적용
color_scheme: samsung

# 코드 박스 복사 버튼
enable_copy_code_button: true

# 네비게이션 정렬 사용
nav_sort: case_insensitive

# 푸터
footer_content: "본 자료는 삼성전자판매 AX 리더 실전 프로그램의 비공식 보조 자료입니다. 공식 자료는 <a href='https://pbt.co.kr/'>PBT LMS</a>를 확인해주세요. · 제작 운영: <a href='https://magicecole.com'>magicecole</a>"

# 마지막 수정 시간
last_edit_timestamp: true
last_edit_time_format: "%Y-%m-%d"

# 페이지 하단 링크
gh_edit_link: false

# 보조 영역 (우상단)
aux_links:
  "PBT LMS":
    - "https://pbt.co.kr/"
  "오픈채팅":
    - "https://open.kakao.com/o/g0ligxvi"
  "GitHub":
    - "https://github.com/edumagiceco/samsung-ax-leader-program"
aux_links_new_tab: true

# 모든 페이지 기본 레이아웃
defaults:
  - scope:
      path: ""
    values:
      layout: default

# 마크다운
markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

# 플러그인
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# 제외
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md

# Just the Docs 콜아웃
callouts_level: quiet
callouts:
  warning:
    title: 주의
    color: red
  tip:
    title: 팁
    color: green
  note:
    title: 참고
    color: purple
  important:
    title: 중요
    color: yellow
